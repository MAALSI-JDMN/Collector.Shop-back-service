name: CI Base Express + Lint

on:
  push:
    branches: [ "master", "develop"]
  pull_request:
    branches: [ "master", "develop"]

env:
  BACK_COVERAGE: coverage-back.info
  NODE_VERSION: 20

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Installation Node
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json

      - name: Installation des paquets
        working-directory: ./backend
        run: npm install

      - name: NPM Security Audit
        working-directory: ./backend
        run: npm audit --audit-level=high --omit=dev

      - name: Vérification Syntaxe (Lint)
        working-directory: ./backend
        run: npm run lint

      - name: Exécution des tests d'intégration
        working-directory: ./backend
        run: npm test -- --coverage --coverageReporters="lcov"

      - name: Prépare le rapport de couverture back (LCOV)
        working-directory: ./backend
        run: |
          test -f coverage/lcov.info || (echo "Pas de LCOV back, création d'un stub" && mkdir -p coverage && printf "TN:\nSF:dummy.js\nDA:1,0\nend_of_record\n" > coverage/lcov.info)
          mv coverage/lcov.info ../${{ env.BACK_COVERAGE }}

      - name: Artefact couverture backend
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: ${{ env.BACK_COVERAGE }}
          retention-days: 7

  sonarcloud:
    name: Qualité • SonarCloud (multi-langages)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Télécharge couverture backend
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage

      - name: Scan SonarCloud (PHP + JS/TS)
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=MAALSI-JDMN_Collector.Shop-back-service
            -Dsonar.organization=maalsi-jdmn
            -Dsonar.javascript.lcov.reportPaths=${{ env.BACK_COVERAGE }}
            -Dsonar.sources=backend/routes
            -Dsonar.tests=backend/tests
            -Dsonar.exclusions=**/node_modules/**,frontend/**
            -Dsonar.qualitygate.wait=true
          
  zap-scan:
    runs-on: ubuntu-latest
    needs: sonarcloud
    
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lancement du serveur et Scan ZAP
        run: |
          mkdir -p zap_reports
          touch app.log
          
          chmod 777 zap_reports

          cd backend
          npm ci
          nohup npm start > ../app.log 2>&1 &
          cd ..

          echo "Attente du démarrage du serveur..."
          for i in $(seq 1 30); do
            if curl -s -o /dev/null http://localhost:3000; then
              echo "Serveur prêt après ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Le serveur n'a pas démarré dans les temps"
              cat app.log
              exit 1
            fi
            sleep 1
          done

          docker run --rm --network host \
            -v $(pwd)/zap_reports:/zap/wrk/:rw \
            zaproxy/zap-stable zap-baseline.py \
            -t http://localhost:3000 -I -r zap_report.html || true

      - name: Sauvegarde des artefacts (Rapport & Logs)
        uses: actions/upload-artifact@v4
        if: always() # Garantit que l'artefact est créé même si le test échoue
        with:
          name: zap-reports
          path: |
            zap_reports/zap_report.html
            app.log
          retention-days: 7
